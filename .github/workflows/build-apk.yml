name: Собрать APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Установить NDK и CMake
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264" "cmake;3.22.1"
      - name: Установить Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH
      - name: Собрать debug APK
        run: gradle :app:assembleDebug --no-daemon
      - name: Build and test portable TZF core
        run: |
          cmake -S . -B build-host -DBUILD_TESTING=ON
          cmake --build build-host --parallel
          ctest --test-dir build-host --output-on-failure
      - name: Сохранить APK
        uses: actions/upload-artifact@v4
        with:
          name: tzf-viewer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
