name: Build APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264" "cmake;3.22.1"
      - name: Test and build debug APK
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug --no-daemon
      - name: Build and test portable TZF core
        run: |
          cmake -S . -B build-host -DBUILD_TESTING=ON
          cmake --build build-host --parallel
          ctest --test-dir build-host --output-on-failure
      - name: Restore release keystore
        env:
          TZF_KEYSTORE_BASE64: ${{ secrets.TZF_KEYSTORE_BASE64 }}
        run: printf '%s' "$TZF_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tzf-release.jks"
      - name: Build signed release APK
        env:
          TZF_KEYSTORE_PATH: ${{ runner.temp }}/tzf-release.jks
          TZF_STORE_PASSWORD: ${{ secrets.TZF_STORE_PASSWORD }}
          TZF_KEY_ALIAS: ${{ secrets.TZF_KEY_ALIAS }}
          TZF_KEY_PASSWORD: ${{ secrets.TZF_KEY_PASSWORD }}
          TZF_VERSION_CODE: ${{ github.run_number }}
          TZF_VERSION_NAME: 0.2.${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --no-daemon
      - name: Prepare nightly release metadata
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 0.2.${{ github.run_number }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk tzf-viewer-latest.apk
          SHA256=$(sha256sum tzf-viewer-latest.apk | cut -d ' ' -f 1)
          printf '{"versionCode":%s,"versionName":"%s","apkUrl":"https://github.com/macyok1/tzf-viewer-releases/releases/download/nightly/tzf-viewer-latest.apk","sha256":"%s","minSdk":26}\n' "$VERSION_CODE" "$VERSION_NAME" "$SHA256" > update.json
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tzf-viewer-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            tzf-viewer-latest.apk
            update.json
      - name: Publish nightly updater assets
        env:
          GH_TOKEN: ${{ secrets.TZF_RELEASES_REPO_TOKEN }}
          RELEASES_REPO: macyok1/tzf-viewer-releases
        run: |
          gh release view nightly --repo "$RELEASES_REPO" >/dev/null 2>&1 || gh release create nightly --repo "$RELEASES_REPO" --prerelease --title "TZF Viewer nightly" --notes "Automatic build from private source repository"
          gh release upload nightly tzf-viewer-latest.apk update.json --repo "$RELEASES_REPO" --clobber
