name: Promote nightly to public release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Public version tag (for example v0.2.42)
        required: true
        type: string
      notes:
        description: Release notes
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Download current nightly assets
        env:
          GH_TOKEN: ${{ secrets.TZF_RELEASES_REPO_TOKEN }}
          RELEASES_REPO: macyok1/tzf-viewer-releases
        run: gh release download nightly --repo "$RELEASES_REPO" --pattern 'tzf-viewer-latest.apk' --pattern 'update.json'
      - name: Verify nightly manifest and APK
        run: |
          test -s tzf-viewer-latest.apk
          test -s update.json
          EXPECTED=$(jq -r .sha256 update.json)
          ACTUAL=$(sha256sum tzf-viewer-latest.apk | cut -d ' ' -f1)
          test "$EXPECTED" = "$ACTUAL"
      - name: Create public release from nightly
        env:
          GH_TOKEN: ${{ secrets.TZF_RELEASES_REPO_TOKEN }}
          RELEASES_REPO: macyok1/tzf-viewer-releases
          TAG: ${{ inputs.tag }}
          NOTES: ${{ inputs.notes }}
        run: |
          jq --arg tag "$TAG" '.apkUrl="https://github.com/macyok1/tzf-viewer-releases/releases/download/"+$tag+"/tzf-viewer-latest.apk"' update.json > public-update.json
          mv public-update.json update.json
          gh release create "$TAG" tzf-viewer-latest.apk update.json --repo "$RELEASES_REPO" --title "$TAG" --notes "$NOTES"
